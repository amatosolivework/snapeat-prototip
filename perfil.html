<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Preferències i configuració de SnapEat.">
  <title>SnapEat — Perfil</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Salta al contingut principal</a>

  <main id="main-content" class="container" role="main">
    <header class="perfil-header">
      <h1>Perfil</h1>
    </header>

    <section class="setmana-section" aria-labelledby="prefs-title">
      <h2 id="prefs-title">Preferències alimentàries</h2>
      <fieldset>
        <legend class="visually-hidden">Restriccions</legend>
        <label class="checkbox-label"><input type="checkbox" id="pref-vegetaria"> Vegetarià/ana</label>
        <label class="checkbox-label"><input type="checkbox" id="pref-sense-gluten"> Sense gluten</label>
        <label class="checkbox-label"><input type="checkbox" id="pref-sense-lactosa"> Sense lactosa</label>
      </fieldset>
    </section>

    <section class="setmana-section" aria-labelledby="budget-default-title">
      <h2 id="budget-default-title">Pressupost per defecte</h2>
      <div class="input-with-suffix">
        <input type="number" id="default-budget" class="input-field" value="30" min="10" max="200">
        <span class="input-suffix" aria-hidden="true">€ / setmana</span>
      </div>
    </section>

    <section class="setmana-section" aria-labelledby="info-title">
      <h2 id="info-title">Sobre SnapEat</h2>
      <p>Prototip desenvolupat pel Grup B3 dins l'assignatura Factors Humans i Computació (UB, 25-26).</p>
    </section>
  </main>
